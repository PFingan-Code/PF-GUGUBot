<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>GUGUBot 配置</title>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg:         #ffffff; --bg-muted: #f8fafc; --bg-card: #f1f5f9;
      --text:       #0f172a; --text-muted: #64748b; --border: #e2e8f0;
      --primary:    #2563eb; --primary-h: #1d4ed8;
      --danger:     #dc2626; --success:   #16a34a;
      --input-bg:   #ffffff; --input-bd:  #cbd5e1;
      --toggle-off: #cbd5e1; --toggle-on: #2563eb;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px; color: var(--text); line-height: 1.55; background: var(--bg);
    }
    html[data-theme="dark"] {
      --bg: #0f1419; --bg-muted: #161b22; --bg-card: #21262d;
      --text: #e6edf3; --text-muted: #8b949e; --border: #30363d;
      --primary: #388bfd; --primary-h: #58a6ff;
      --danger: #f85149; --success: #3fb950;
      --input-bg: #161b22; --input-bd: #30363d;
      --toggle-off: #30363d; --toggle-on: #388bfd;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 1rem 1.25rem 3rem; max-width: 900px; }

    h1 { font-size: 1.2rem; margin: 0 0 0.4rem; font-weight: 700; }
    .lead { color: var(--text-muted); font-size: 0.875rem; margin: 0 0 0.9rem; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; padding-bottom: 0.65rem; border-bottom: 1px solid var(--border); }
    #status-bar { flex: 1; font-size: 0.8rem; color: var(--text-muted); text-align: right; white-space: nowrap; }

    /* Buttons */
    button { padding: 0.38rem 0.75rem; cursor: pointer; border-radius: 6px; border: 1px solid var(--input-bd); background: var(--bg-card); color: var(--text); font-size: 0.83rem; }
    button:hover { background: var(--border); }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.primary:hover { background: var(--primary-h); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    /* Info badges */
    .info-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.65rem; }
    .badge { display: inline-flex; align-items: center; padding: 0.1rem 0.45rem; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card); font-size: 0.76rem; color: var(--text-muted); }
    .badge.ok  { border-color: var(--success); color: var(--success); }

    /* Sections */
    details { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.6rem; background: var(--bg-muted); }
    details > summary { padding: 0.6rem 0.85rem; font-weight: 600; font-size: 0.92rem; cursor: pointer; list-style: none; display: flex; align-items: center; gap: 0.35rem; user-select: none; }
    details > summary::before { content: '▶'; font-size: 0.6rem; color: var(--text-muted); transition: transform .15s; }
    details[open] > summary::before { transform: rotate(90deg); }
    details > summary::-webkit-details-marker { display: none; }
    .sec-body { padding: 0.4rem 0.85rem 0.85rem; }
    details.sub { margin: 0.35rem 0; background: var(--bg); }
    details.sub > summary { font-size: 0.88rem; font-weight: 500; padding: 0.45rem 0.7rem; }
    details.sub > .sec-body { padding: 0.2rem 0.7rem 0.7rem; }

    /* Fields grid */
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem 1rem; }
    @media (max-width: 580px) { .fields { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 0.15rem; }
    .field.full { grid-column: 1/-1; }
    .flabel { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 0.25rem; }
    .flabel .tip { display: inline-flex; align-items: center; justify-content: center; width: 13px; height: 13px; border-radius: 50%; background: var(--border); font-size: 0.62rem; cursor: help; flex-shrink: 0; }
    .fdesc { font-size: 0.73rem; color: var(--text-muted); }

    /* Inputs */
    input[type="text"], input[type="number"], input[type="password"], textarea, select {
      width: 100%; padding: 0.32rem 0.45rem; border: 1px solid var(--input-bd); border-radius: 5px;
      background: var(--input-bg); color: var(--text); font-size: 0.83rem; font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: vertical; min-height: 60px; font-family: monospace; }
    input[type="number"] { max-width: 130px; }

    /* Toggle */
    .twrap { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.15rem; }
    .toggle { position: relative; display: inline-block; width: 38px; height: 21px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: var(--toggle-off); border-radius: 21px; transition: .18s; }
    .slider::before { content: ''; position: absolute; height: 15px; width: 15px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .18s; }
    .toggle input:checked + .slider { background: var(--toggle-on); }
    .toggle input:checked + .slider::before { transform: translateX(17px); }
    .tlabel { font-size: 0.82rem; }

    /* Toast */
    #toast { position: fixed; bottom: 1.2rem; right: 1.2rem; padding: 0.55rem 0.9rem; border-radius: 7px; font-size: 0.83rem; font-weight: 500; background: var(--success); color: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.2); transform: translateY(70px); opacity: 0; transition: transform .22s, opacity .22s; z-index: 9999; pointer-events: none; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.err  { background: var(--danger); }

    code { font-size: .82em; background: var(--bg-card); padding: .1em .3em; border-radius: 3px; }
    .muted { color: var(--text-muted); font-size: .83rem; }
    #raw-yaml { width: 100%; font-family: monospace; font-size: .75rem; min-height: 180px; }
  </style>
  <script>
    (function () {
      function sync() {
        var dark = false;
        try {
          var el = window.parent.document.documentElement;
          if (el.classList.contains('dark') || el.getAttribute('data-theme') === 'dark' || el.getAttribute('data-mui-color-scheme') === 'dark') dark = true;
          else if (el.getAttribute('data-theme') === 'light' || el.getAttribute('data-mui-color-scheme') === 'light') { document.documentElement.setAttribute('data-theme','light'); return; }
        } catch(e){}
        if (!dark && window.matchMedia('(prefers-color-scheme:dark)').matches) dark = true;
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      }
      sync();
      try { window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', sync); }
      catch(e) { window.matchMedia('(prefers-color-scheme:dark)').addListener(sync); }
    })();
  </script>
</head>

<h1>GUGUBot 配置</h1>
<p class="lead">配置文件：<code>config/gugubot/config.yml</code>。修改后点击「保存」，再点「重载」生效。</p>

<div class="toolbar">
  <button id="btn-load">↻ 加载配置</button>

  <button id="btn-reload">⟳ 重载插件</button>
  <div id="status-bar">—</div>

<div class="info-row" id="info-row" style="display:none">
  <span id="bv" class="badge"></span>
  <span id="bm" class="badge"></span>
  <span id="bc" class="badge ok"></span>
</div>

<div id="form-root"><p class="muted">正在加载配置…</p></div>

<details id="raw-sec">
  <summary>原始 YAML 预览</summary>
  <div class="sec-body">
    <p class="muted" style="margin:0 0 .4rem">只读。复杂字段（<code>chat_templates</code>、<code>custom_group_name</code> 等）请直接编辑服务器上的 yml 文件。</p>

  </div>
</details>

<div id="toast"></div>

/* ======================================================================
   类型推断
   ====================================================================== */
function inferType(value, pathStr) {
  // META 强制覆盖
  const m = META[pathStr];
  if (m && m.type) return m.type;

  if (value === null || value === undefined) return 'text';
  if (typeof value === 'boolean') return 'bool';
  if (typeof value === 'number')  return 'number';
  if (typeof value === 'string')  return 'text';
  if (Array.isArray(value)) {
    // 空数组 or 全是数字/null → array-number；否则 array（字符串）；含对象 → yaml
    if (value.length === 0) return 'array';
    if (value.some(v => v !== null && typeof v === 'object')) return 'yaml';
    if (value.every(v => v === null || typeof v === 'number')) return 'array-number';
    return 'array';
  }
  if (typeof value === 'object') {
    // 空对象 → yaml（动态 key 对象）
    if (Object.keys(value).length === 0) return 'yaml';
    return 'object';
  }
  return 'text';
}

/* key → 可读标签（snake_case → Title Case） */
function fmtKey(k) {
  return k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

/* ======================================================================
   DOM 构建
   ====================================================================== */
let _uid = 0;
function uid() { return 'f' + (++_uid); }

function mkField(pathArr, value) {
  const pathStr = pathArr.join('.');
  const m = META[pathStr] || {};
  const type = inferType(value, pathStr);
  const id = uid();

  const div = document.createElement('div');
  const isLong = (type === 'array' || type === 'array-number' || type === 'yaml');
  div.className = 'field' + (isLong ? ' full' : '');

  const labelText = m.label || fmtKey(pathArr[pathArr.length - 1]);
  const labelEl = document.createElement('div');
  labelEl.className = 'flabel';
  labelEl.innerHTML = `<label for="${id}">${labelText}</label>` +
    (m.desc ? `<span class="tip" title="${m.desc.replace(/"/g,'&quot;').replace(/\n/g,' ')}">?</span>` : '');
  div.appendChild(labelEl);

  if (type === 'bool') {
    const tw = document.createElement('div');
    tw.className = 'twrap';
    const checked = !!value;
    tw.innerHTML = `<label class="toggle"><input type="checkbox" id="${id}"${checked ? ' checked' : ''}
        data-path="${pathStr}" data-type="bool"><span class="slider"></span></label>
      <span class="tlabel">${checked ? '开启' : '关闭'}</span>`;
    tw.querySelector('input').addEventListener('change', e => {
      tw.querySelector('.tlabel').textContent = e.target.checked ? '开启' : '关闭';
    });
    div.appendChild(tw);

  } else if (type === 'array' || type === 'array-number') {
    const arr = Array.isArray(value) ? value.filter(v => v != null) : [];
    const ta = document.createElement('textarea');
    ta.id = id; ta.rows = 3; ta.spellcheck = false;
    ta.placeholder = '每行一条，空行忽略';
    ta.value = arr.join('\n');
    ta.dataset.path = pathStr;
    ta.dataset.type = type;
    div.appendChild(ta);

  } else if (type === 'yaml') {
    const ta = document.createElement('textarea');
    ta.id = id; ta.rows = 4; ta.spellcheck = false;
    try { ta.value = jsyaml.dump(value, {indent:2,lineWidth:-1}).trimEnd(); }
    catch { ta.value = String(value); }
    ta.dataset.path = pathStr;
    ta.dataset.type = 'yaml';
    div.appendChild(ta);

  } else if (type === 'number') {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.id = id; inp.step = 'any';
    inp.value = value != null ? String(value) : '';
    inp.dataset.path = pathStr; inp.dataset.type = 'number';
    div.appendChild(inp);

  } else if (type === 'password') {
    const inp = document.createElement('input');
    inp.type = 'password'; inp.id = id; inp.autocomplete = 'off';
    inp.placeholder = '留空保留原值';
    inp.value = value != null ? String(value) : '';
    inp.dataset.path = pathStr; inp.dataset.type = 'password';
    div.appendChild(inp);

  } else { // text
    const inp = document.createElement('input');
    inp.type = 'text'; inp.id = id;
    inp.value = value != null ? String(value) : '';
    inp.dataset.path = pathStr; inp.dataset.type = 'text';
    div.appendChild(inp);
  }

  return div;
}

/**
 * 递归渲染一个对象节点为 <details> 折叠面板。
 * 叶子字段放入同一个 .fields 网格；子对象递归嵌套。
 */
function mkSection(pathArr, obj, depth) {
  const pathStr = pathArr.join('.');
  const m = META[pathStr] || {};
  const title = m.title || fmtKey(pathArr[pathArr.length - 1] || 'Config');

  const det = document.createElement('details');
  if (m.open || depth === 0) det.open = true;
  if (depth > 0) det.classList.add('sub');

  det.innerHTML = `<summary>${title}</summary>`;
  const body = document.createElement('div');
  body.className = 'sec-body';

  const grid = document.createElement('div');
  grid.className = 'fields';
  let hasLeaves = false;

  Object.entries(obj).forEach(([key, val]) => {
    const childPath = [...pathArr, key];
    const childType = inferType(val, childPath.join('.'));
    if (childType === 'object') {
      // 先把已有叶子 grid flush 进 body
      if (hasLeaves) { body.appendChild(grid.cloneNode(true)); grid.innerHTML = ''; hasLeaves = false; }
      body.appendChild(mkSection(childPath, val, depth + 1));
    } else {
      grid.appendChild(mkField(childPath, val));
      hasLeaves = true;
    }
  });

  if (hasLeaves) body.appendChild(grid);
  det.appendChild(body);
  return det;
}

function buildForm(cfg) {
  const root = document.getElementById('form-root');
  root.innerHTML = '';
  Object.entries(cfg).forEach(([key, val]) => {
    const pathArr = [key];
    const type = inferType(val, key);
    if (type === 'object') {
      root.appendChild(mkSection(pathArr, val, 0));
    } else {
      // 顶层叶子（理论上不存在，但做容错）
      const grid = document.createElement('div');
      grid.className = 'fields';
      grid.appendChild(mkField(pathArr, val));
      root.appendChild(grid);
    }
  });
}

/* ======================================================================
   工具
   ====================================================================== */
const CONFIG_PATH = 'config/gugubot/config.yml';

function apiRoot() {
  try {
    const cfg = window.parent && window.parent.__GUGU_CONFIG__;
    const root = (cfg && cfg.root_path) ? String(cfg.root_path) : '';
    return root.replace(/\/$/, '') + '/api';
  } catch(e) { return '/api'; }
}

function setPath(obj, pathArr, value) {
  let o = obj;
  for (let i = 0; i < pathArr.length - 1; i++) {
    if (o[pathArr[i]] == null || typeof o[pathArr[i]] !== 'object') o[pathArr[i]] = {};
    o = o[pathArr[i]];
  }
  o[pathArr[pathArr.length - 1]] = value;
}

function deepCopy(v) { return JSON.parse(JSON.stringify(v)); }

let toastTid;
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTid);
  toastTid = setTimeout(() => { el.className = ''; }, 3500);
}

function setStatus(msg, isErr) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.style.color = isErr ? 'var(--danger)' : 'var(--text-muted)';
}

/* ======================================================================
   加载
   ====================================================================== */
let _lastCfg = null;

async function loadConfig() {
  setStatus('正在加载配置…');
  document.getElementById('btn-load').disabled = true;
  try {
    const r = await fetch(
      `${apiRoot()}/load_config_file?path=${encodeURIComponent(CONFIG_PATH)}`,
      { credentials: 'include' }
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    const cfg = jsyaml.load(text) || {};
    _lastCfg = cfg;
    buildForm(cfg);  // 动态渲染
    document.getElementById('raw-yaml').value = text;
    setStatus('配置加载成功');
    toast('配置加载成功');
  } catch(e) {
    setStatus('加载失败：' + e.message, true);
    toast('加载失败：' + e.message, true);
  } finally {
    document.getElementById('btn-load').disabled = false;
  }
}

/* ======================================================================
   保存：遍历所有带 data-path 的控件，覆写到 _lastCfg 的深拷贝上
   ====================================================================== */
async function saveConfig() {
  if (!_lastCfg) { toast('请先加载配置', true); return; }
  setStatus('正在保存…');
  document.getElementById('btn-save').disabled = true;
  try {
    const cfg = deepCopy(_lastCfg);

    document.querySelectorAll('[data-path]').forEach(el => {
      const pathArr = el.dataset.path.split('.');
      const type    = el.dataset.type;
      let value;

      switch (type) {
        case 'bool':
          value = el.checked; break;
        case 'number': {
          const n = parseFloat(el.value);
          value = isNaN(n) ? 0 : n; break;
        }
        case 'array-number':
          value = el.value.split('\n').map(s => s.trim()).filter(Boolean).map(s => {
            const n = Number(s); return isNaN(n) ? s : n;
          }); break;
        case 'array':
          value = el.value.split('\n').map(s => s.trim()).filter(Boolean); break;
        case 'yaml':
          try { value = jsyaml.load(el.value); }
          catch { value = el.value; } break;
        case 'password':
          if (el.value === '') return; // 空 = 保留原值
          value = el.value; break;
        default:
          value = el.value;
      }
      setPath(cfg, pathArr, value);
    });

    const text = jsyaml.dump(cfg, { indent: 2, lineWidth: -1, noRefs: true });
    const r = await fetch(`${apiRoot()}/save_config_file`, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: CONFIG_PATH, content: text }),
    });
    const res = await r.json().catch(() => ({}));
    if (res.status === 'success' || r.ok) {
      _lastCfg = cfg;
      document.getElementById('raw-yaml').value = text;
      setStatus('保存成功（重载插件后生效）');
      toast('保存成功！重载插件后生效。');
    } else {
      throw new Error(res.message || `HTTP ${r.status}`);
    }
  } catch(e) {
    setStatus('保存失败：' + e.message, true);
    toast('保存失败：' + e.message, true);
  } finally {
    document.getElementById('btn-save').disabled = false;
  }
}

/* ======================================================================
   重载插件
   ====================================================================== */
async function reloadPlugin() {
  setStatus('正在重载插件…');
  document.getElementById('btn-reload').disabled = true;
  try {
    const r = await fetch(`${apiRoot()}/send_command`, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: '!!MCDR plugin reload gugubot' }),
    });
    const res = await r.json().catch(() => ({}));
    if (res.status === 'success') {
      setStatus('插件已重载'); toast('插件重载命令已发送');
    } else {
      throw new Error(res.message || `HTTP ${r.status}`);
    }
  } catch(e) {
    setStatus('重载失败：' + e.message, true);
    toast('重载失败：' + e.message, true);
  } finally {
    document.getElementById('btn-reload').disabled = false;
  }
}

/* ======================================================================
   运行状态（版本号 / 连接器）
   ====================================================================== */
async function fetchStatus() {
  try {
    const r = await fetch(`${apiRoot()}/plugin/gugubot/status`, { credentials: 'include' });
    if (!r.ok) return;
    const d = await r.json();
    if (!d.ok) return;
    document.getElementById('info-row').style.display = 'flex';
    document.getElementById('bv').textContent = 'v' + (d.version || '?');
    document.getElementById('bm').textContent = d.is_main_server ? '主服务器' : '子服务器';
    document.getElementById('bc').textContent = '连接器：' + (d.connectors || []).join(', ');
  } catch(e) {}
}

/* ======================================================================
   初始化
   ====================================================================== */
fetchStatus();
loadConfig();
document.getElementById('btn-load').addEventListener('click', loadConfig);
document.getElementById('btn-save').addEventListener('click', saveConfig);
document.getElementById('btn-reload').addEventListener('click', reloadPlugin);
</script>
</body>
